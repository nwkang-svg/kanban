<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>인사총무팀 업무 칸반 보드</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕',Malgun Gothic,sans-serif;background:#E9EEF4;color:#1E293B;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ── */
#topbar{height:54px;background:#1F3864;color:#fff;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.tb-brand{font-size:14px;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:7px}
.tb-brand small{font-size:10px;opacity:.55;font-weight:400}
#wip-row{display:flex;gap:5px;align-items:center;flex:1;margin:0 10px;overflow:hidden;min-width:0}
.wip-chip{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:14px;background:rgba(255,255,255,.1);font-size:10.5px;white-space:nowrap;cursor:pointer;transition:background .15s}
.wip-chip:hover{background:rgba(255,255,255,.2)}
.wip-chip.wip-over{background:#DC2626}
.wip-chip.wip-full{background:#B45309}
.wip-dot{width:6px;height:6px;border-radius:50%}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.wip-chip.wip-over{animation:pulse 1.4s infinite}
.tb-r{display:flex;gap:6px;align-items:center;flex-shrink:0}
#conn-badge{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;font-size:10.5px;font-weight:600;white-space:nowrap;cursor:pointer;border:1px solid rgba(255,255,255,.2)}
.cb-connected{background:rgba(16,185,129,.2);color:#6EE7B7}
.cb-offline{background:rgba(251,191,36,.15);color:#FCD34D}
.cb-disconnected{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}
.fpill{padding:3px 9px;border-radius:12px;border:1px solid rgba(255,255,255,.25);background:transparent;color:#fff;font-size:11px;cursor:pointer;transition:all .15s;font-family:inherit}
.fpill:hover{background:rgba(255,255,255,.15)}
.fpill.on{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.6);font-weight:600}
.tb-btn{padding:6px 11px;border-radius:6px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:4px}
.tb-btn:hover{background:rgba(255,255,255,.18)}
.btn-add-main{background:#fff;color:#1F3864;border-color:#fff}
.btn-add-main:hover{background:#F0F4FF}

/* ── BOARD ── */
#board{flex:1;display:flex;gap:10px;padding:12px;overflow:hidden}
.col{flex:1;min-width:210px;display:flex;flex-direction:column;border-radius:10px;overflow:hidden;border:1px solid #CBD5E1;background:#F1F5F9}
.col-head{padding:10px 12px;flex-shrink:0}
.col-head-main{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.col-name{font-size:13px;font-weight:700;flex:1}
.col-cnt{padding:1px 8px;border-radius:10px;font-size:11px;font-weight:700;color:#fff}
.col-sub{font-size:10px;color:#64748B;margin-bottom:2px}
.wip-limit-row{font-size:10.5px;margin-top:3px;padding:2px 6px;border-radius:4px;display:inline-block}
.wip-ok{background:#D1FAE5;color:#065F46}.wip-full{background:#FEF3C7;color:#92400E}.wip-over{background:#FEE2E2;color:#991B1B}
.blocker-hd{font-size:10.5px;margin-top:3px;color:#D97706;padding:1px 6px;background:#FEF3C7;border-radius:4px;display:inline-block}
.col-backlog .col-head{background:#F8FAFC;border-bottom:2px solid #94A3B8}.col-backlog .col-cnt{background:#64748B}
.col-prog   .col-head{background:#EFF6FF;border-bottom:2px solid #2563EB}.col-prog   .col-cnt{background:#2563EB}
.col-review .col-head{background:#FFFBEB;border-bottom:2px solid #D97706}.col-review .col-cnt{background:#D97706}
.col-done   .col-head{background:#ECFDF5;border-bottom:2px solid #059669}.col-done   .col-cnt{background:#059669}
.col-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:7px}
.col-body.drag-over{background:#FEE2E2;outline:2px dashed #DC2626;outline-offset:-3px}
.col-foot{flex-shrink:0;padding:6px 8px;border-top:1px solid #E2E8F0}
.add-btn{width:100%;padding:6px 10px;border:1px dashed #CBD5E1;border-radius:6px;background:transparent;font-size:11.5px;color:#94A3B8;cursor:pointer;font-family:inherit;transition:all .15s;text-align:left}
.add-btn:hover{background:#fff;border-color:#2563EB;color:#2563EB}
.done-filter{font-size:10.5px;color:#64748B;display:flex;gap:5px;margin-top:3px;align-items:center;flex-wrap:wrap}
.done-filter button{border:none;background:none;cursor:pointer;font-size:10.5px;font-family:inherit;color:#64748B;padding:1px 5px;border-radius:3px}
.done-filter button.on{background:#059669;color:#fff}
.done-filter .done-export{background:#059669;color:#fff;padding:2px 7px;margin-left:auto;font-weight:600}
.done-filter .done-export:hover{background:#047857}
.done-range{display:flex;align-items:center;gap:5px;margin-top:5px}
.done-range input{font-size:10.5px;padding:2px 5px;border:1px solid #CBD5E1;border-radius:4px;font-family:inherit;color:#475569}
.done-range span{font-size:10.5px;color:#64748B}
.col-empty{text-align:center;padding:20px 10px;color:#CBD5E1;font-size:12px}

/* ── CARD ── */
.card{background:#fff;border-radius:8px;border:1px solid #E2E8F0;padding:10px 11px;cursor:pointer;transition:box-shadow .15s,transform .1s;border-left:4px solid #E2E8F0;user-select:none}
.card:hover{box-shadow:0 3px 12px rgba(0,0,0,.1);transform:translateY(-1px)}
.card.dragging{opacity:.4;transform:rotate(1.5deg)}
/* 라벨 색상은 JS에서 동적 주입 */
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.lchip{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}
.due-chip{font-size:10.5px;font-weight:600;white-space:nowrap}
.due-ok{color:#64748B}.due-soon{color:#D97706}.due-urgent{color:#DC2626}.due-over{color:#DC2626;font-weight:700}
.card-title{font-size:12.5px;font-weight:700;color:#1E293B;line-height:1.4;margin-bottom:7px}
.blocker-row{display:flex;gap:5px;background:#FEF3C7;border-radius:5px;padding:4px 7px;margin-bottom:6px;font-size:11px;color:#92400E}
.cl-row{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.cl-bar{flex:1;height:5px;background:#F1F5F9;border-radius:3px;overflow:hidden}
.cl-fill{height:100%;border-radius:3px;background:#059669;transition:width .3s}
.cl-cnt{font-size:10.5px;color:#64748B;white-space:nowrap}
.card-bottom{display:flex;align-items:center;justify-content:space-between}
.av{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.card-process{display:flex;flex-wrap:wrap;gap:3px;align-items:center;justify-content:flex-end;flex:1;margin-left:8px;min-width:0}
.cp-step{font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:9px;background:#F1F5F9;color:#64748B;white-space:nowrap;display:inline-flex;align-items:center;line-height:1.3}
.cp-step.cp-done{background:#D1FAE5;color:#065F46}
.cp-arr{font-size:10px;color:#94A3B8;flex-shrink:0;font-weight:700}
.move-btns{display:flex;gap:3px}
.mbtn{width:22px;height:22px;border-radius:4px;border:1px solid #E2E8F0;background:#F8FAFC;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.mbtn:hover{background:#DBEAFE;border-color:#2563EB;color:#1D4ED8}
.mbtn.done-btn{background:#D1FAE5;border-color:#059669;color:#065F46}
.done-date{font-size:10px;color:#10B981;font-weight:600}

/* ── MODAL BASE ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;width:560px;max-width:96vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.mhd{padding:14px 16px;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;gap:8px;position:sticky;top:0;background:#fff;z-index:1}
.mhd h3{font-size:14px;font-weight:700;color:#1F3864;flex:1}
.mclose{background:none;border:none;font-size:18px;cursor:pointer;color:#94A3B8;padding:2px 6px;border-radius:3px}
.mclose:hover{background:#F1F5F9}
.mbody{padding:16px}
.mfoot{padding:11px 16px;border-top:1px solid #E2E8F0;display:flex;justify-content:space-between;align-items:center;gap:8px}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:11px;font-weight:600;color:#475569;margin-bottom:4px}
.fr input,.fr select,.fr textarea{width:100%;padding:7px 9px;border:1px solid #CBD5E1;border-radius:5px;font-size:12.5px;font-family:inherit;color:#1E293B}
.fr input:focus,.fr select:focus,.fr textarea:focus{outline:none;border-color:#2563EB;box-shadow:0 0 0 2px rgba(37,99,235,.1)}
.fr textarea{resize:vertical;min-height:55px}
.fr-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cl-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:6px;background:#F8FAFC;border:1px solid #E2E8F0;margin-bottom:5px}
.cl-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#059669;flex-shrink:0}
.cl-item.done-cl{opacity:.6}
.cl-item.done-cl .cl-text{text-decoration:line-through;color:#94A3B8}
.cl-text{flex:1;font-size:12.5px}
.cl-del{background:none;border:none;color:#CBD5E1;cursor:pointer;font-size:13px;padding:0 3px}
.cl-del:hover{color:#DC2626}
.cl-add-row{display:flex;gap:6px;margin-top:6px}
.cl-add-inp{flex:1;padding:6px 9px;border:1px dashed #CBD5E1;border-radius:5px;font-size:12.5px;font-family:inherit}
.cl-add-inp:focus{outline:none;border-color:#2563EB;border-style:solid}
.status-flow{display:flex;align-items:center;gap:4px;margin-bottom:14px;background:#F8FAFC;padding:8px 12px;border-radius:8px;flex-wrap:wrap}
.sf-step{padding:5px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.sf-step:hover{opacity:.8}
.sf-arr{color:#CBD5E1;font-size:13px}
.sf-step.s-backlog{background:#F1F5F9;color:#475569;border-color:#94A3B8}
.sf-step.s-prog{background:#EFF6FF;color:#1D4ED8;border-color:#2563EB}
.sf-step.s-review{background:#FFFBEB;color:#92400E;border-color:#D97706}
.sf-step.s-done{background:#ECFDF5;color:#065F46;border-color:#059669}
.sf-step.sf-active{font-weight:700;box-shadow:0 0 0 2px rgba(0,0,0,.1)}

/* ── MEMBER MANAGEMENT ── */
.mem-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid #E2E8F0;background:#F8FAFC;margin-bottom:6px}
.mem-row-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.mem-row-av:hover{border-color:rgba(0,0,0,.2)}
.mem-row-name{font-size:13px;font-weight:700;flex:1}
.mem-row-role{font-size:11px;color:#94A3B8}
.mem-row-btns{display:flex;gap:4px}
.mem-edit-form{background:#F0F9FF;border:1px solid #BAE6FD;border-radius:8px;padding:10px;margin-bottom:6px}
.color-grid{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.cswatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.cswatch:hover{transform:scale(1.2)}
.cswatch.sel{border-color:#1E293B;transform:scale(1.1)}
.add-mem-box{background:#F8FAFC;border:1px dashed #CBD5E1;border-radius:8px;padding:12px;margin-top:8px}
.add-mem-box h4{font-size:12px;font-weight:700;color:#475569;margin-bottom:8px}

/* ── SETTINGS MODAL ── */
.conn-status-box{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;margin-bottom:14px;font-size:12.5px}
.csb-connected{background:#ECFDF5;border:1px solid #A7F3D0;color:#065F46}
.csb-offline{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E}
.csb-disconnected{background:#F8FAFC;border:1px solid #E2E8F0;color:#64748B}
.conn-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cd-green{background:#10B981}.cd-yellow{background:#F59E0B}.cd-gray{background:#94A3B8}
.guide-box{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:12px;margin-top:14px;font-size:12px;line-height:1.8}
.guide-box h4{font-size:12.5px;font-weight:700;color:#1F3864;margin-bottom:8px}
.guide-box ol{padding-left:16px;color:#475569}
.guide-box code{background:#E2E8F0;padding:1px 5px;border-radius:3px;font-size:11px;font-family:monospace}
.schema-box{background:#1E293B;border-radius:8px;padding:12px;margin-top:10px;max-height:160px;overflow-y:auto}
.schema-box pre{font-size:10.5px;color:#94A3B8;font-family:monospace;line-height:1.6;white-space:pre-wrap}
details{margin-top:12px}
details summary{font-size:12.5px;font-weight:600;color:#1F3864;cursor:pointer;padding:8px 0;border-top:1px solid #E2E8F0}
details summary:hover{color:#2563EB}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 13px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-p{background:#1F3864;color:#fff}.btn-p:hover{background:#2E74B5}
.btn-o{background:#fff;color:#334155;border:1px solid #CBD5E1}.btn-o:hover{background:#F8FAFC}
.btn-sm{padding:4px 9px;font-size:11px;border-radius:4px}
.btn-g{background:#059669;color:#fff}.btn-g:hover{background:#047857}
.btn-r{background:#DC2626;color:#fff}.btn-r:hover{background:#B91C1C}
.btn-a{background:#D97706;color:#fff}.btn-a:hover{background:#B45309}
.btn-ghost{background:none;border:none;cursor:pointer;font-size:12px;color:#64748B;padding:4px 7px;border-radius:4px}
.btn-ghost:hover{background:#F1F5F9;color:#1E293B}

/* ── TOAST ── */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(8px);background:#1F3864;color:#fff;padding:9px 18px;border-radius:8px;font-size:12.5px;z-index:300;opacity:0;transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.col-body::-webkit-scrollbar{width:4px}
.col-body::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:2px}
.modal::-webkit-scrollbar{width:5px}
.modal::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}

/* ── TOOLTIP ── */
.has-tip{position:relative;cursor:help}
.kb-tooltip{position:fixed;z-index:200;background:#1E293B;color:#F8FAFC;border-radius:10px;
  padding:12px 14px;width:260px;box-shadow:0 8px 24px rgba(0,0,0,.3);pointer-events:none;
  opacity:0;transition:opacity .18s;font-size:11.5px;line-height:1.6}
.kb-tooltip.show{opacity:1}
.kb-tt-title{font-size:12.5px;font-weight:700;color:#fff;margin-bottom:6px;border-bottom:1px solid rgba(255,255,255,.15);padding-bottom:5px}
.kb-tt-section{margin-bottom:4px}
.kb-tt-label{font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.kb-tt-val{color:#CBD5E1}
.col-info-btn{width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.12);border:none;
  font-size:9px;color:inherit;cursor:help;display:inline-flex;align-items:center;justify-content:center;
  margin-left:3px;flex-shrink:0;opacity:.7;transition:opacity .15s}
.col-info-btn:hover{opacity:1;background:rgba(0,0,0,.22)}

/* ── GUIDE MODAL ── */
.guide-section{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:10px;padding:14px 16px;margin-bottom:12px}
.guide-num{width:28px;height:28px;border-radius:50%;background:#1F3864;color:#fff;
  display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
  flex-shrink:0;margin-right:10px}
.guide-sec-title{font-size:13px;font-weight:700;color:#1F3864;display:flex;align-items:center;margin-bottom:7px}
.guide-sec-body{font-size:12px;color:#475569;line-height:1.75;white-space:pre-wrap}
.col-guide-table{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:12px}
.col-guide-table th{background:#1F3864;color:#fff;padding:7px 10px;text-align:left;font-size:11px}
.col-guide-table td{padding:7px 10px;border-bottom:1px solid #E2E8F0;vertical-align:top;line-height:1.55}
.col-guide-table tr:last-child td{border-bottom:none}
.col-guide-table tr:nth-child(even) td{background:#F8FAFC}
.guide-modal-wide{width:700px !important}

/* ══════════════════════════════════════════════
   MOBILE RESPONSIVE (≤640px)
   ══════════════════════════════════════════════ */
@media (max-width: 640px) {

  /* ── 바디 ── */
  body { overflow: hidden; height: 100dvh; }

  /* ── 상단바: 2줄 배치 ── */
  #topbar {
    height: auto;
    flex-wrap: wrap;
    padding: 7px 10px 5px;
    gap: 3px 6px;
  }
  .tb-brand { order: 1; flex: 1; font-size: 12.5px; min-width: 0; }
  .tb-brand small { display: none; }
  .tb-r {
    order: 2;
    flex-shrink: 0;
    max-width: calc(100% - 0px);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    flex-wrap: nowrap;
    padding-bottom: 2px;
    gap: 4px;
    scrollbar-width: none;
  }
  .tb-r::-webkit-scrollbar { display: none; }
  .tb-btn {
    flex-shrink: 0;
    padding: 5px 9px;
    font-size: 10.5px;
    white-space: nowrap;
  }
  #wip-row {
    order: 10;
    flex-basis: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 0;
    padding: 1px 0 3px;
    gap: 4px;
    flex-wrap: nowrap;
    scrollbar-width: none;
  }
  #wip-row::-webkit-scrollbar { display: none; }
  .wip-chip { flex-shrink: 0; font-size: 10px; padding: 3px 7px; }
  #conn-badge { font-size: 10px; padding: 3px 7px; }
  #filter-row { display: none; }

  /* ── 보드: 좌우 스와이프 ── */
  #board {
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    gap: 8px;
    padding: 8px;
    scroll-padding-left: 8px;
    scrollbar-width: none;
  }
  #board::-webkit-scrollbar { display: none; }
  .col {
    flex: none;
    width: calc(100vw - 24px);
    scroll-snap-align: start;
    scroll-snap-stop: always;
    max-height: calc(100dvh - 108px);
  }
  .col-body {
    max-height: none;
    flex: 1;
    overflow-y: auto;
  }
  .col-name { font-size: 12.5px; }

  /* ── 스와이프 힌트 인디케이터 ── */
  #board::after {
    content: '';
    flex: none;
    width: 1px;
  }

  /* ── 카드: 터치 친화적 ── */
  .card { padding: 11px 13px; }
  .card-title { font-size: 13px; }
  .mbtn { width: 30px; height: 30px; font-size: 13px; }
  .av { width: 26px; height: 26px; font-size: 10px; }
  .add-btn { padding: 10px; font-size: 12.5px; min-height: 40px; }
  .done-filter button { padding: 4px 9px; min-height: 30px; }
  .col-empty { padding: 30px 12px; font-size: 12.5px; }

  /* ── 모달: 하단 시트 ── */
  .overlay { align-items: flex-end !important; }
  .modal {
    width: 100vw !important;
    max-width: 100vw !important;
    max-height: 92vh !important;
    border-radius: 18px 18px 0 0 !important;

async function initSupabase() {
  const url = SB_PRESET_URL || localStorage.getItem('sb_url');
  const key = SB_PRESET_KEY || localStorage.getItem('sb_key');
  if (!url || !key) { sbStatus='disconnected'; updateConnBadge(); return false; }
  try {
    sb = window.supabase.createClient(url, key);
    const {error} = await sb.schema('kanban').from('members').select('id').limit(1);
    if (error) throw error;
    sbStatus = 'connected';
    updateConnBadge();
    subscribeRealtime();
    return true;
  } catch(e) {
    sb = null; sbStatus = 'disconnected'; updateConnBadge();
    toast('Supabase 연결 실패: ' + (e.message||'오류'), 'err');
    return false;
  }
}

function updateConnBadge() {
  const el = $('conn-badge'); if(!el) return;
  el.className = '';
  if(sbStatus==='connected'){ el.className='cb-connected'; el.textContent='🟢 Supabase'; }
  else if(sbStatus==='offline'){ el.className='cb-offline'; el.textContent='🟡 로컬모드'; }
  else { el.className='cb-disconnected'; el.textContent='🔴 미연결'; }
}

function subscribeRealtime() {
  if(!sb) return;
  sb.channel('kanban-rt')
    .on('postgres_changes',{event:'*',schema:'kanban',table:'tasks'}, async()=>{
      if(syncLock) return;
      await loadFromSupabase(); renderAll();
    })
    .on('postgres_changes',{event:'*',schema:'kanban',table:'members'}, async()=>{
      if(syncLock) return;
      const {data:m}=await sb.schema('kanban').from('members').select('*').order('sort_order');
      if(m&&m.length>0) MEMBERS=m;
      renderAll();
    })
    .on('postgres_changes',{event:'*',schema:'kanban',table:'checklists'}, async()=>{
      if(syncLock) return;
      await loadFromSupabase(); renderAll();
    })
    .on('postgres_changes',{event:'*',schema:'kanban',table:'settings'}, async()=>{
      await _pullSettings(); renderAll();
    })
    .on('postgres_changes',{event:'*',schema:'kanban',table:'vacations'}, async()=>{
      if(syncLock) return;
      const {data:vd}=await sb.schema('kanban').from('vacations').select('*').order('start_date');
      if(vd) vacations=vd.map(v=>({id:v.id,name:v.member_name,startDate:v.start_date,endDate:v.end_date,type:v.type||'연차',note:v.note||''}));
      renderAll();
    })
    .on('postgres_changes',{event:'*',schema:'kanban',table:'notices'}, async()=>{
      if(syncLock) return;
      const {data:nd}=await sb.schema('kanban').from('notices').select('*').order('pinned',{ascending:false}).order('created_at',{ascending:false});
      if(nd) notices=nd.map(n=>({id:n.id,title:n.title,content:n.content||'',author:n.author||'',date:n.notice_date,pinned:n.pinned||false}));
      renderNoticeBanner();
      if(document.getElementById('overlay')?.classList.contains('show')) _renderNoticeModal();
    })
    .subscribe();
}

  try {
    const {checklist,...td}=t;
    await sb.schema('kanban').from('tasks').upsert({

async function loadFromSupabase(loadFiles) {
  if(!sb) return;
  await _pullSettings();
  const {data:md}=await sb.schema('kanban').from('members').select('*').order('sort_order');
  const {data:td}=await sb.schema('kanban').from('tasks').select('*').order('created_at');
  const {data:cd}=await sb.schema('kanban').from('checklists').select('*').order('sort_order');
  if(md&&md.length>0) MEMBERS=md;
  const {data:vd}=await sb.schema('kanban').from('vacations').select('*').order('start_date');
  if(vd) vacations=vd.map(v=>({id:v.id,name:v.member_name,startDate:v.start_date,endDate:v.end_date,type:v.type||'연차',note:v.note||''}));
  const {data:nd}=await sb.schema('kanban').from('notices').select('*').order('pinned',{ascending:false}).order('created_at',{ascending:false});
  if(nd) notices=nd.map(n=>({id:n.id,title:n.title,content:n.content||'',author:n.author||'',date:n.notice_date,pinned:n.pinned||false}));
  if(td) tasks=td.map(t=>({
    id:t.id,title:t.title,assignee:t.assignee||'',label:t.label||Object.keys(LABELS)[0],due:t.due||'',
    startDate:t.start_date||'',
    status:t.status||'backlog',blocker:t.blocker||'',blockedAt:t.blocked_at||'',
    note:t.note||'',doneDate:t.done_date||'',
    checklist:(cd||[]).filter(c=>c.task_id===t.id).map(c=>({id:c.id,text:c.text,done:c.done}))
  }));
  // ── 확장정보(목적/목표/성과/프로세스) + 첨부파일 동기화 ──
  try{
    const {data:mt}=await sb.schema('kanban').from('task_meta').select('task_id,data');
    if(mt) mt.forEach(r=>{ try{ const o=JSON.parse(r.data); if(o&&typeof o==='object') applyMetaRow(r.task_id,o,!loadFiles); }catch(e){} });
    if(loadFiles){
      const {data:tf}=await sb.schema('kanban').from('task_files').select('*');
      if(tf) tf.forEach(f=>{ const m=taskMeta[f.task_id]; if(m&&Array.isArray(m.phases)){ const ph=m.phases.find(p=>p.id===f.phase_id); if(ph){ ph.files=ph.files||[]; ph.files.push({id:f.id,name:f.name,type:f.type,size:f.size,data:f.data}); } } });
    }
    saveToLocalMetaSilently();
  }catch(e){}  // task_meta/task_files 테이블 미생성 시 무시
}
// 서버 경량 메타를 로컬 taskMeta에 반영 (keepFiles=true면 기존 첨부 blob 보존)
function applyMetaRow(taskId, lightObj, keepFiles){
  if(!Array.isArray(lightObj.phases)) lightObj.phases=[];
  const existing=taskMeta[taskId];
  lightObj.phases.forEach(p=>{
    if(keepFiles && existing && Array.isArray(existing.phases)){
      const ep=existing.phases.find(x=>x.id===p.id);
      p.files = (ep&&Array.isArray(ep.files))?ep.files:[];
    } else { p.files=[]; }
  });
  if(typeof lightObj.purpose!=='string')lightObj.purpose='';
  if(typeof lightObj.goal!=='string')lightObj.goal='';
  if(typeof lightObj.result!=='string')lightObj.result='';
  taskMeta[taskId]=lightObj;
}
function saveToLocalMetaSilently(){ try{ localStorage.setItem('kb_taskmeta',JSON.stringify(taskMeta)); }catch(e){} }

// ── Push existing tasks to Supabase ──
async function pushAllToSupabase() {
  if(!sb||sbStatus!=='connected') return;
  toast('Supabase에 동기화 중...');
  syncLock=true;
  try {
    for(const m of MEMBERS) await sb.schema('kanban').from('members').upsert({id:m.id,name:m.name,role:m.role,color:m.color,sort_order:MEMBERS.indexOf(m)});
    for(const t of tasks) {
      await sb.schema('kanban').from('tasks').upsert({id:t.id,title:t.title,assignee:t.assignee,label:t.label,due:t.due,status:t.status,blocker:t.blocker,blocked_at:t.blockedAt,note:t.note,done_date:t.doneDate,start_date:t.startDate||''});
      if(t.checklist.length>0) await sb.schema('kanban').from('checklists').upsert(t.checklist.map((c,i)=>({id:c.id,task_id:t.id,text:c.text,done:c.done,sort_order:i})));
    }
    // 확장정보(목적/목표/성과/프로세스) + 첨부파일
    for(const id in taskMeta){
      const m=taskMeta[id]; if(!m) continue;
      const light={purpose:m.purpose||'',goal:m.goal||'',result:m.result||'',
        phases:(m.phases||[]).map(p=>({id:p.id,name:p.name,desc:p.desc||'',date:p.date||'',done:!!p.done,files:[]}))};
      await sb.schema('kanban').from('task_meta').upsert({task_id:id,data:JSON.stringify(light),updated_at:new Date().toISOString()});
      for(const p of (m.phases||[])) for(const f of (p.files||[]))
        await sb.schema('kanban').from('task_files').upsert({id:f.id,task_id:id,phase_id:p.id,name:f.name,type:f.type,size:f.size,data:f.data,created_at:new Date().toISOString()});
    }
    for(const v of vacations) await sb.schema('kanban').from('vacations').upsert({id:v.id,member_name:v.name,start_date:v.startDate,end_date:v.endDate,type:v.type,note:v.note});
    for(const n of notices) await sb.schema('kanban').from('notices').upsert({id:n.id,title:n.title,content:n.content,author:n.author,notice_date:n.date,pinned:n.pinned,updated_at:new Date().toISOString()});
    await _pushSettings();
    toast('✅ Supabase 동기화 완료');
  } catch(e){ toast('동기화 오류: '+e.message,'err'); }
  finally { setTimeout(()=>syncLock=false,800); }
}

const $=id=>document.getElementById(id);
function uuid(){return 'id-'+Math.random().toString(36).slice(2)+'-'+Date.now().toString(36)}
function escHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function toast(msg,type){
  const el=$('toast');el.textContent=msg;
  el.style.background=type==='err'?'#DC2626':type==='warn'?'#D97706':'#1F3864';
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);
}
function av(name,size=22){
  const m=MEMBERS.find(x=>x.name===name)||{name:name,color:'#94A3B8'};
  const fs=Math.round(size*.38)+'px';
  return `<div class="av" style="width:${size}px;height:${size}px;font-size:${fs};background:${m.color}" title="${m.name}">${name?name.slice(-2):''}</div>`;
}
function parseDue(due){
  if(!due)return null;
  if(due.includes('-')){return new Date(due+'T00:00:00');}
  const[mo,d]=due.split('/').map(Number);
  return new Date(new Date().getFullYear(),mo-1,d);
}
function fmtDueDisp(due){
  if(!due)return '';
  if(due.includes('-')){const[,m,d]=due.split('-');return m+'/'+d;}
  return due;
}
function daysLeft(due){
  if(!due)return 999;
  const dt=parseDue(due);if(!dt)return 999;
  const now=new Date();now.setHours(0,0,0,0);
  return Math.ceil((dt-now)/86400000);
}
function dueClass(due){const dl=daysLeft(due);return dl<0?'due-over':dl<=2?'due-urgent':dl<=5?'due-soon':'due-ok';}
function dueText(due){const dl=daysLeft(due);const dp=fmtDueDisp(due);return dl<0?`~${dp} D+${-dl}초과`:dl===0?`~${dp} D-Day!`:`~${dp} D-${dl}`;}
function phaseStats(t){
  const m=taskMeta[t.id];
  const phases=m&&Array.isArray(m.phases)?m.phases:null;
  if(!phases)return{done:0,total:DEFAULT_PHASE_NAMES.length};
  return{done:phases.filter(p=>p.done).length,total:phases.length};
}
function clDone(t){return phaseStats(t).done;}
function clTotal(t){return phaseStats(t).total;}
function clPct(t){const s=phaseStats(t);return s.total?Math.round(s.done/s.total*100):0;}
function blockedDays(t){if(!t.blockedAt)return 0;return Math.floor((Date.now()-new Date(t.blockedAt))/86400000);}
function isThisWeek(ds){if(!ds)return false;const dt=parseDue(ds);if(!dt)return false;const now=new Date();const s=new Date(now);s.setDate(now.getDate()-now.getDay());const e=new Date(s);e.setDate(s.getDate()+6);return dt>=s&&dt<=e;}
function getFiltered(status){
  let a=tasks.filter(t=>t.status===status);
  if(filterMember!=='all')a=a.filter(t=>t.assignee===filterMember);
  if(status==='done'){
    if(doneView==='week')a=a.filter(t=>isThisWeek(t.doneDate));
    else if(doneView==='range')a=a.filter(t=>inDoneRange(t.doneDate));
  }
  return a;
}
function inDoneRange(ds){
  if(!ds)return false;
  const dt=parseDue(ds);if(!dt)return false;
  if(doneRangeStart){const s=new Date(doneRangeStart+'T00:00:00');if(dt<s)return false;}
  if(doneRangeEnd){const e=new Date(doneRangeEnd+'T23:59:59');if(dt>e)return false;}
  return true;
}
function setDoneView(v){
  doneView=v;
  if(v==='range'&&!doneRangeStart){
    const pad=n=>String(n).padStart(2,'0');
    const toISO=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    // 완료(Done)로 옮긴 날짜들을 기준으로 기간 기본값 설정
    const dts=tasks.filter(t=>t.status==='done'&&t.doneDate).map(t=>parseDue(t.doneDate)).filter(Boolean).sort((a,b)=>a-b);
    if(dts.length){doneRangeStart=toISO(dts[0]);doneRangeEnd=toISO(dts[dts.length-1]);}
    else{const now=new Date();doneRangeStart=`${now.getFullYear()}-${pad(now.getMonth()+1)}-01`;doneRangeEnd=toISO(now);}
  }
  renderAll();
}
function exportDoneExcel(){
  let list=tasks.filter(t=>t.status==='done');
  if(filterMember!=='all')list=list.filter(t=>t.assignee===filterMember);
  let periodLabel='전체기간';
  if(doneView==='week'){list=list.filter(t=>isThisWeek(t.doneDate));periodLabel='이번주';}
  else if(doneView==='range'){list=list.filter(t=>inDoneRange(t.doneDate));periodLabel=`${doneRangeStart||'처음'}~${doneRangeEnd||'끝'}`;}
  if(list.length===0){toast('내보낼 완료 항목이 없습니다','warn');return;}
  const headers=['프로젝트명','담당자','분류','완료일','목적','목표','업무 프로세스'];
  const rows=list.map(t=>{
    const m=taskMeta[t.id];
    const lb=(LABELS[t.label]&&LABELS[t.label].name)||'';
    const phasesArr=(m&&Array.isArray(m.phases))?m.phases:DEFAULT_PHASE_NAMES.map(nm=>({name:nm,done:false}));
    const procStr=phasesArr.map(p=>`${p.name}(${p.done?'완료':'미완'}${p.date?', '+p.date:''})`).join(' → ');
    return [t.title,t.assignee||'',lb,fmtDueDisp(t.doneDate)||'',(m&&m.purpose)||'',(m&&m.goal)||'',procStr];
  });
  const esc=v=>{const s=String(v==null?'':v);return /[",\n\r]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
  const csv='﻿'+[headers,...rows].map(r=>r.map(esc).join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`완료프로젝트_${periodLabel.replace(/[^0-9A-Za-z가-힣]/g,'_')}.csv`;
  a.click();URL.revokeObjectURL(a.href);
  toast(`📥 완료 ${list.length}건 다운로드 (${periodLabel})`);
}

async function _pullSettings(){
  if(!sb||sbStatus!=='connected') return;
  try{
    const {data}=await sb.schema('kanban').from('settings').select('*');
    if(!data) return;
    let changed=false;
    for(const row of data){
      if(row.key==='labels'){try{LABELS=JSON.parse(row.value);SB_PRESET_LABELS=LABELS;changed=true;}catch(e){}}
      if(row.key==='wip_max'){const v=parseInt(row.value);if(!isNaN(v)){WIP_MAX=v;SB_PRESET_WIP_MAX=v;changed=true;}}
      if(row.key==='guide'){try{GUIDE_CONTENT=JSON.parse(row.value);localStorage.setItem('kb_guide',row.value);changed=true;}catch(e){}}
    }
    if(changed){
      try{localStorage.setItem('kb_labels',JSON.stringify(LABELS));localStorage.setItem('kb_wip_max',String(WIP_MAX));}catch(e){}
      updateLabelStyles();
    }
  }catch(e){}  // settings table may not exist yet
}

async function moveCard(id,newStatus){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  if(newStatus==='prog'&&t.status!=='prog'){
    const wip=tasks.filter(x=>x.status==='prog'&&x.assignee===t.assignee).length;
    if(wip>=WIP_MAX&&!confirm(`⚠️ WIP 제한 초과!\n${t.assignee}의 진행 중 업무: ${wip}개\n최대 ${WIP_MAX}개. 계속하시겠습니까?`))return;
  }
  if(newStatus==='review'&&t.status!=='review'){
    const r=prompt('블로커 또는 검토 사유:');
    if(r===null)return;t.blocker=r;t.blockedAt=new Date().toISOString().slice(0,10);
  }
  if(newStatus==='done'){
    const n=new Date(),pad=x=>String(x).padStart(2,'0');
    t.doneDate=`${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;t.blocker='';
  }
  if(t.status==='review'&&newStatus!=='review'){t.blocker='';t.blockedAt='';}
  t.status=newStatus;
  await pushTask(t);
  renderAll();
  toast(`→ ${COLS.find(c=>c.key===newStatus)?.name}`);
  if($('overlay').classList.contains('show')){closeModal();setTimeout(()=>openCard(id),50);}
}

// ── 같은 컬럼 내 위/아래 이동 ──
function swapInTasks(idA,idB){const i=tasks.findIndex(t=>t.id===idA),j=tasks.findIndex(t=>t.id===idB);if(i<0||j<0)return;[tasks[i],tasks[j]]=[tasks[j],tasks[i]];}
function moveCardVert(id,dir){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const list=getFiltered(t.status);
  const idx=list.findIndex(x=>x.id===id);
  const nb=list[idx+dir];
  if(!nb)return;
  swapInTasks(id,nb.id);
  saveToLocal();pushTask(t);renderAll();
}

function toggleSelectMode(){
  selectMode=!selectMode;
  if(!selectMode)selectedIds.clear();

function onCardClick(e,id){
  if(selectMode){toggleSelect(id);return;}

  openCard(id);
}
function toggleSelect(id){
  if(selectedIds.has(id))selectedIds.delete(id);else selectedIds.add(id);
  const card=$(`card-${id}`);
  if(card){card.classList.toggle('selected',selectedIds.has(id));const cb=card.querySelector('.card-select');if(cb)cb.checked=selectedIds.has(id);}
  updateMultiBar();
}
function clearSelection(){selectedIds.clear();document.querySelectorAll('.card.selected').forEach(c=>{c.classList.remove('selected');const cb=c.querySelector('.card-select');if(cb)cb.checked=false;});updateMultiBar();}
function updateMultiBar(){
  const bar=$('multi-bar');if(!bar)return;
  if(selectedIds.size>0){
    bar.classList.add('show');
    bar.innerHTML=`<span class="mb-cnt">✓ ${selectedIds.size}개 선택됨</span>
      <button class="mb-btn" onclick="moveSelectedVert(-1)" title="위로">↑ 위로</button>
      <button class="mb-btn" onclick="moveSelectedVert(1)" title="아래로">↓ 아래로</button>
      <span style="opacity:.5;font-size:11px">→</span>
      ${COLS.map(c=>`<button class="mb-btn" onclick="moveSelectedTo('${c.key}')">${c.icon} ${c.name}</button>`).join('')}
      <button class="mb-clear" onclick="clearSelection()">선택 해제</button>`;
  }else{
    bar.classList.remove('show');bar.innerHTML='';
  }
}
async function moveSelectedTo(status){
  if(selectedIds.size===0)return;
  const ids=[...selectedIds];
  for(const id of ids){
    const t=tasks.find(x=>x.id===id);if(!t)continue;
    if(status==='done'){const n=new Date(),pad=x=>String(x).padStart(2,'0');t.doneDate=`${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;t.blocker='';}
    if(t.status==='review'&&status!=='review'){t.blocker='';t.blockedAt='';}
    t.status=status;
    await pushTask(t);
  }
  selectedIds.clear();
  renderAll();
  toast(`${ids.length}개 → ${COLS.find(c=>c.key===status)?.name}`);
}
function moveSelectedVert(dir){
  if(selectedIds.size===0)return;
  const cols=[...new Set(tasks.filter(t=>selectedIds.has(t.id)).map(t=>t.status))];
  cols.forEach(status=>{
    const list=getFiltered(status).map(t=>t.id);
    if(dir<0){
      for(let i=0;i<list.length;i++){
        if(selectedIds.has(list[i])&&i>0&&!selectedIds.has(list[i-1])){swapInTasks(list[i],list[i-1]);[list[i-1],list[i]]=[list[i],list[i-1]];}
      }
    }else{
      for(let i=list.length-1;i>=0;i--){
        if(selectedIds.has(list[i])&&i<list.length-1&&!selectedIds.has(list[i+1])){swapInTasks(list[i],list[i+1]);[list[i+1],list[i]]=[list[i],list[i+1]];}
      }
    }
  });
  saveToLocal();renderAll();
}

// DRAG & DROP
// ══════════════════════════════════════════════
function onDragStart(e,id){dragId=id;e.dataTransfer.effectAllowed='move';setTimeout(()=>$(`card-${id}`)?.classList.add('dragging'),0);}
function onDragEnd(){if(dragId)$(`card-${dragId}`)?.classList.remove('dragging');dragId=null;dragTargetId=null;document.querySelectorAll('.col-body').forEach(c=>c.classList.remove('drag-over'));document.querySelectorAll('.card').forEach(c=>{c.classList.remove('drop-before','drop-after');});}
function onDragOver(e,k){
  e.preventDefault();
  if(!e.target.closest('.card')) $(`body-${k}`)?.classList.add('drag-over');
}
function onDragLeave(e,k){if(!$(`body-${k}`)?.contains(e.relatedTarget))$(`body-${k}`)?.classList.remove('drag-over');}
function onDrop(e,k){
  e.preventDefault();
  $(`body-${k}`)?.classList.remove('drag-over');
  if(e.target.closest('.card')){return;} // onCardDrop이 처리
  if(dragId){
    if(selectedIds.has(dragId)&&selectedIds.size>1){moveSelectedTo(k);}
    else moveCard(dragId,k);
    dragId=null;
  }
}

// ── 카드 내 드래그 (같은 컬럼 순서 변경) ──
function onCardDragOver(e,cardId){
  e.preventDefault();
  e.stopPropagation();
  if(dragId===cardId)return;
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('drop-before','drop-after'));
  const card=$(`card-${cardId}`);if(!card)return;
  const rect=card.getBoundingClientRect();
  dragTargetId=cardId;
  dragInsertBefore=e.clientY<rect.top+rect.height/2;
  card.classList.add(dragInsertBefore?'drop-before':'drop-after');
}

async function onCardDrop(e,cardId){
  e.preventDefault();
  e.stopPropagation();
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('drop-before','drop-after'));
  if(!dragId||dragId===cardId){dragTargetId=null;return;}
  const srcTask=tasks.find(t=>t.id===dragId);
  const tgtTask=tasks.find(t=>t.id===cardId);
  if(!srcTask||!tgtTask){dragId=null;dragTargetId=null;return;}
  if(selectedIds.has(dragId)&&selectedIds.size>1){
    // 다중 선택 그룹 이동
    if(srcTask.status!==tgtTask.status){const s=tgtTask.status;dragId=null;dragTargetId=null;await moveSelectedTo(s);return;}
    dragId=null;dragTargetId=null;return;
  }
  if(srcTask.status===tgtTask.status){
    // 같은 컬럼 — 순서만 변경
    tasks=tasks.filter(t=>t.id!==dragId);
    const tgtIdx=tasks.findIndex(t=>t.id===cardId);
    const insertIdx=dragInsertBefore?tgtIdx:tgtIdx+1;
    tasks.splice(insertIdx,0,srcTask);
    saveToLocal();renderAll();toast('순서 변경됨');
  }else{
    // 다른 컬럼 — 상태 변경
    const savedId=dragId;dragId=null;
    await moveCard(savedId,tgtTask.status);
  }
  dragId=null;dragTargetId=null;
}

function enterCardEdit(id){cardEdit=true;openCard(id);}

// ── 프로세스 단계 렌더링 ──
function renderPhases(t){
  const m=getMeta(t.id);
  const phases=m.phases;
  const tot=clTotal(t), dn=clDone(t), pct=clPct(t);
  const summary=`<div style="display:flex;align-items:center;gap:10px;background:#F0F9FF;border:1px solid #BAE6FD;border-radius:9px;padding:9px 13px;margin-bottom:13px">
    <span style="font-size:13.5px;font-weight:700;color:#1F3864;white-space:nowrap">프로젝트 완료율</span>
    <div style="flex:1;height:9px;background:#E0F2FE;border-radius:5px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${pct===100?'#059669':'#2563EB'};border-radius:5px;transition:width .3s"></div></div>
    <span style="font-size:13.5px;font-weight:700;color:${pct===100?'#059669':'#1F3864'};white-space:nowrap">${dn}/${tot}${tot?` (${pct}%)`:''}${pct===100&&tot>0?' ✅':''}</span>
  </div>`;
  const ed=cardEdit;
  const body=phases.map((p,i)=>{
    const files=(p.files||[]).map(f=>`<span class="file-chip">📄 <a href="${f.data}" download="${escAttr(f.name)}" title="${escAttr(f.name)}">${escHtml(f.name)}</a>${ed?`<button onclick="delFile('${t.id}','${p.id}','${f.id}')" title="첨부 삭제">✕</button>`:''}</span>`).join('');
    const nameHtml = ed
      ? `<input class="phase-name" value="${escAttr(p.name)}" placeholder="단계 이름" onblur="renamePhase('${t.id}','${p.id}',this.value)">`
      : `<span class="phase-name-view">${escHtml(p.name)}</span>`;
    const dateHtml = ed
      ? `<span class="phase-date-label">완료일</span><input type="date" class="phase-date" value="${p.date||''}" onchange="setPhaseDate('${t.id}','${p.id}',this.value)" title="완료일">`
      : `<span class="phase-date-view">완료일: ${p.date?p.date:'미정'}</span>`;
    const moveHtml = ed
      ? `<div class="phase-move">
          <button class="phase-mbtn" onclick="movePhase('${t.id}','${p.id}',-1)" ${i===0?'disabled':''} title="위로">↑</button>
          <button class="phase-mbtn" onclick="movePhase('${t.id}','${p.id}',1)" ${i===phases.length-1?'disabled':''} title="아래로">↓</button>
          <button class="phase-mbtn" onclick="deletePhase('${t.id}','${p.id}')" title="단계 삭제" style="color:#DC2626">🗑</button>
        </div>`
      : '';
    const descHtml = ed
      ? `<textarea class="phase-desc" placeholder="이 단계에서 할 일을 적어주세요..." onblur="setPhaseDesc('${t.id}','${p.id}',this.value)">${escHtml(p.desc||'')}</textarea>`
      : `<div class="phase-desc-view">${p.desc?escHtml(p.desc):'<span style="color:#94A3B8">미입력</span>'}</div>`;
    const doneChkHtml = `<label class="phase-done-chk ${p.done?'on':''}" title="단계 완료"><input type="checkbox" ${p.done?'checked':''} onchange="togglePhaseDone('${t.id}','${p.id}')"><span>완료</span></label>`;
    return `<div class="phase-card${p.done?' phase-done-card':''}">
      <div class="phase-head">
        <span class="phase-num">${i+1}</span>
        ${nameHtml}
        ${dateHtml}
        ${doneChkHtml}
        ${moveHtml}
      </div>
      <div class="phase-body">
        <div class="phase-sec-label">📝 세부 내용</div>
        ${descHtml}
        <div class="phase-sec-label" style="margin-top:11px">📎 첨부 파일</div>
        <div>${files||'<span style="font-size:12.5px;color:#94A3B8">첨부 없음</span>'}</div>
        ${ed?`<div><button class="file-add-btn" onclick="attachFile('${t.id}','${p.id}')">📎 파일 첨부</button></div>`:''}
      </div>
    </div>`;
  }).join('');
  return summary+body+(ed?`<button class="phase-add-btn" onclick="addPhase('${t.id}')">+ 프로세스 단계 추가</button>`:'');
}

function _refreshPhases(tid){const t=tasks.find(x=>x.id===tid);const c=$(`card-phases-${tid}`);if(c&&t)c.innerHTML=renderPhases(t);}
function savePG(tid){const m=getMeta(tid);const pu=$(`cd-purpose-${tid}`),go=$(`cd-goal-${tid}`),re=$(`cd-result-${tid}`);if(pu)m.purpose=pu.value;if(go)m.goal=go.value;if(re)m.result=re.value;saveTaskMeta(tid);}

// 카드 상세 화면의 모든 입력(목적·목표·단계 세부내용·완료일·팀장 멘트사항 등)을 한 번에 저장
function saveCardDetail(tid){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  const m=getMeta(tid);
  const pu=$(`cd-purpose-${tid}`),go=$(`cd-goal-${tid}`),re=$(`cd-result-${tid}`);
  if(pu)m.purpose=pu.value;
  if(go)m.goal=go.value;
  if(re)m.result=re.value;
  const wrap=$(`card-phases-${tid}`);
  if(wrap){
    wrap.querySelectorAll('.phase-card').forEach((card,i)=>{
      const p=m.phases[i];if(!p)return;
      const nm=card.querySelector('.phase-name');if(nm)p.name=(nm.value||'').trim()||p.name;
      const ds=card.querySelector('.phase-desc');if(ds)p.desc=ds.value;
      const dt=card.querySelector('.phase-date');if(dt)p.date=dt.value||'';
    });
  }
  const note=$('modal-note');if(note)t.note=note.value;
  const bl=$('modal-blocker');if(bl)t.blocker=bl.value;
  saveTaskMeta(tid);
  pushTask(t);
  renderBoard();
  toast('💾 프로젝트 내용이 저장되었습니다');
  cardEdit=false;
  openCard(tid);
}
function addPhase(tid){const m=getMeta(tid);m.phases.push({id:uuid(),name:'새 단계',desc:'',date:'',done:false,files:[]});saveTaskMeta(tid);_refreshPhases(tid);}
function deletePhase(tid,pid){const m=getMeta(tid);if(m.phases.length<=1){toast('단계는 최소 1개 필요합니다','warn');return;}if(!confirm('이 단계를 삭제할까요?\n첨부파일도 함께 삭제됩니다.'))return;m.phases=m.phases.filter(p=>p.id!==pid);saveTaskMeta(tid);_deletePhaseFilesSB(pid);_refreshPhases(tid);renderBoard();}
function movePhase(tid,pid,dir){const m=getMeta(tid);const i=m.phases.findIndex(p=>p.id===pid);const j=i+dir;if(j<0||j>=m.phases.length)return;[m.phases[i],m.phases[j]]=[m.phases[j],m.phases[i]];saveTaskMeta(tid);_refreshPhases(tid);}
function renamePhase(tid,pid,val){const m=getMeta(tid);const p=m.phases.find(x=>x.id===pid);if(p){p.name=(val||'').trim()||p.name;saveTaskMeta(tid);}}
function setPhaseDate(tid,pid,val){const m=getMeta(tid);const p=m.phases.find(x=>x.id===pid);if(p){p.date=val||'';saveTaskMeta(tid);}}
function setPhaseDesc(tid,pid,val){const m=getMeta(tid);const p=m.phases.find(x=>x.id===pid);if(p){p.desc=val||'';saveTaskMeta(tid);}}
function togglePhaseDone(tid,pid){const m=getMeta(tid);const p=m.phases.find(x=>x.id===pid);if(p){p.done=!p.done;saveTaskMeta(tid);_refreshPhases(tid);renderBoard();}}
function delFile(tid,pid,fid){const m=getMeta(tid);const p=m.phases.find(x=>x.id===pid);if(p){p.files=(p.files||[]).filter(f=>f.id!==fid);saveTaskMeta(tid);_deleteFileSB(fid);_refreshPhases(tid);toast('첨부 삭제됨');}}
function attachFile(tid,pid){
  const inp=document.createElement('input');inp.type='file';inp.multiple=true;
  inp.onchange=()=>{
    const files=[...inp.files];if(files.length===0)return;
    let pending=files.length;
    const finish=()=>{if(--pending<=0){saveTaskMeta(tid);_refreshPhases(tid);}};
    files.forEach(f=>{
      if(f.size>3*1024*1024){toast(`${f.name}: 3MB 초과로 첨부 불가`,'warn');finish();return;}
      const r=new FileReader();
      r.onload=()=>{const m=getMeta(tid);const p=m.phases.find(x=>x.id===pid);if(p){p.files=p.files||[];const fo={id:uuid(),name:f.name,type:f.type,size:f.size,data:r.result};p.files.push(fo);_pushFileSB(tid,pid,fo);}finish();};
      r.onerror=()=>{toast(`${f.name} 읽기 실패`,'err');finish();};
      r.readAsDataURL(f);
    });
  };
  inp.click();
}

function renderClList(t){
  return t.checklist.map(c=>`<div class="cl-item ${c.done?'done-cl':''}"><input type="checkbox" ${c.done?'checked':''} onchange="toggleCl('${t.id}','${c.id}')"><span class="cl-text">${escHtml(c.text)}</span><button class="cl-del" onclick="delCl('${t.id}','${c.id}')">✕</button></div>`).join('') || '<div style="font-size:12px;color:#94A3B8;padding:6px 0">세부 작업 없음</div>';
}

async function toggleCl(tid,cid){
  const t=tasks.find(x=>x.id===tid);const c=t?.checklist.find(x=>x.id===cid);
  if(c){c.done=!c.done;const el=$('modal-cl');if(el)el.innerHTML=renderClList(t);_refreshPhases(tid);const card=$(`card-${tid}`);if(card){const bar=card.querySelector('.cl-fill');if(bar)bar.style.width=clPct(t)+'%';const cnt=card.querySelector('.cl-cnt');if(cnt)cnt.textContent=`${clDone(t)}/${clTotal(t)}`;}await pushTask(t);}
}
async function delCl(tid,cid){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  t.checklist=t.checklist.filter(x=>x.id!==cid);
  const el=$('modal-cl');if(el)el.innerHTML=renderClList(t);
  await pushTask(t);toast('항목 삭제됨');
}
async function addCl(tid){
  const inp=$(`cl-inp-${tid}`);if(!inp)return;
  const txt=inp.value.trim();if(!txt)return;
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  t.checklist.push({id:uuid(),text:txt,done:false});
  inp.value='';const el=$('modal-cl');if(el)el.innerHTML=renderClList(t);
  await pushTask(t);toast('항목 추가됨');
}
function updateBlocker(tid){const t=tasks.find(x=>x.id===tid);const el=$('modal-blocker');if(t&&el){t.blocker=el.value;saveToLocal();pushTask(t);}}
function updateNote(tid){const t=tasks.find(x=>x.id===tid);const el=$('modal-note');if(t&&el){t.note=el.value;saveToLocal();pushTask(t);}}
function doneDateISO(t){
  if(!t.doneDate)return '';
  if(t.doneDate.includes('-'))return t.doneDate;
  const dt=parseDue(t.doneDate);if(!dt)return '';
  const pad=n=>String(n).padStart(2,'0');
  return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`;
}
function editDoneDate(id){
  const inp=$(`done-date-${id}`);if(!inp)return;
  inp.style.display='inline-block';
  try{ if(inp.showPicker) inp.showPicker(); else inp.focus(); }catch(e){ inp.focus(); }
}
function updateDoneDate(id,val){
  if(!val)return;
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.doneDate=val;
  saveToLocal();pushTask(t);renderAll();
  toast('✅ 완료일이 변경되었습니다');
  if($('overlay')&&$('overlay').classList.contains('show'))openCard(id);
}

async function saveNewCard(){
  const title=$('nc-title').value.trim();
  if(!title){toast('업무명을 입력하세요','err');return;}
  const status=$('nc-status').value,who=$('nc-who').value;
  if(status==='prog'&&who){
    const wip=tasks.filter(t=>t.status==='prog'&&t.assignee===who).length;
    if(wip>=WIP_MAX&&!confirm(`⚠️ ${who}의 WIP: ${wip}개. 초과됩니다. 계속?`))return;
  }
  const t={id:uuid(),title,assignee:who,label:$('nc-label').value,startDate:$('nc-start').value||'',due:$('nc-due').value||'',status,checklist:[],blocker:'',blockedAt:'',note:'',doneDate:''};
  tasks.push(t);
  closeModal();
  await pushTask(t);
  renderAll();toast('✅ 프로젝트 추가됨');
}

  closeModal();
  showModal('프로젝트 수정',`
    <div class="fr"><label>업무명</label><input id="ec-title" value="${t.title}"></div>
    <div class="fr-row">
      <div class="fr"><label>담당자</label><select id="ec-who"><option value="">미배정</option>${MEMBERS.map(m=>`<option ${m.name===t.assignee?'selected':''}>${m.name}</option>`).join('')}</select></div>
      <div class="fr"><label>분류 태그</label><select id="ec-label">${Object.entries(LABELS).map(([k,v])=>`<option value="${k}" ${k===t.label?'selected':''}>${v.ico} ${v.name}</option>`).join('')}</select></div>
    </div>
    <div class="fr-row">
      <div class="fr"><label>시작일</label><input type="date" id="ec-start" value="${t.startDate||''}"></div>
      <div class="fr"><label>마감일</label><input type="date" id="ec-due" value="${t.due&&t.due.includes('-')?t.due:''}"></div>
    </div>
    <div class="fr"><label>단계</label><select id="ec-status">${COLS.map(c=>`<option value="${c.key}" ${c.key===t.status?'selected':''}>${c.icon} ${c.name}</option>`).join('')}</select></div>
    <div class="fr"><label>메모 / 완료 기준</label><textarea id="ec-note">${t.note||''}</textarea></div>`,

}

async function saveEdit(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.title=$('ec-title').value.trim()||t.title;t.assignee=$('ec-who').value;
  t.label=$('ec-label').value;t.due=$('ec-due').value||t.due;
  t.startDate=$('ec-start').value||t.startDate||'';
  t.status=$('ec-status').value;t.note=$('ec-note').value;
  closeModal();await pushTask(t);renderAll();toast('✅ 수정 완료');
}

async function deleteCard(id){
  if(!confirm('이 프로젝트를 삭제하시겠습니까?'))return;
  tasks=tasks.filter(t=>t.id!==id);
  if(taskMeta[id]){delete taskMeta[id];saveTaskMeta();}
  selectedIds.delete(id);
  closeModal();await deleteTaskSB(id);renderAll();toast('삭제됨');
}

function startEditMember(id){editingMemberId=id;const el=$('mem-list');if(el)el.innerHTML=renderMemList();setTimeout(()=>document.getElementById(`em-name-${id}`)?.focus(),50);}
function cancelEditMember(){editingMemberId=null;const el=$('mem-list');if(el)el.innerHTML=renderMemList();}

async function saveEditMember(id){
  const m=MEMBERS.find(x=>x.id===id);if(!m)return;
  const oldName=m.name;
  const newName=(document.getElementById(`em-name-${id}`)?.value||'').trim();
  if(!newName){toast('이름을 입력하세요','err');return;}
  m.name=newName;m.role=document.getElementById(`em-role-${id}`)?.value||m.role;
  if(oldName!==newName) tasks.forEach(t=>{if(t.assignee===oldName)t.assignee=newName;});
  editingMemberId=null;
  await pushMember(m);
  if(oldName!==newName&&sb&&sbStatus==='connected'){
    syncLock=true;
    try{await sb.schema('kanban').from('tasks').update({assignee:newName}).eq('assignee',oldName);}
    finally{setTimeout(()=>syncLock=false,800);}
  }
  renderAll();
  const el=$('mem-list');if(el)el.innerHTML=renderMemList();
  toast('✅ 팀원 정보 수정됨');
}

async function addMember(){
  const name=($('nm-name')?.value||'').trim();
  const role=($('nm-role')?.value||'').trim();
  if(!name){toast('이름을 입력하세요','err');return;}
  if(MEMBERS.find(m=>m.name===name)){toast('이미 존재하는 이름입니다','warn');return;}
  const m={id:uuid(),name,role,color:newMemberColor};
  MEMBERS.push(m);
  await pushMember(m);
  renderAll();
  const el=$('mem-list');if(el)el.innerHTML=renderMemList();
  if($('nm-name'))$('nm-name').value='';
  if($('nm-role'))$('nm-role').value='';
  toast(`✅ ${name} 추가됨`);
}

async function confirmDeleteMember(id){
  const m=MEMBERS.find(x=>x.id===id);if(!m)return;
  const act=tasks.filter(t=>t.assignee===m.name&&t.status!=='done').length;
  const msg=`${m.name}을(를) 삭제하시겠습니까?${act>0?`\n\n현재 담당 업무 ${act}건의 담당자가 '미배정'으로 변경됩니다.`:''}`;
  if(!confirm(msg))return;
  MEMBERS=MEMBERS.filter(x=>x.id!==id);
  tasks.forEach(t=>{if(t.assignee===m.name)t.assignee='';});
  await deleteMemberSB(id);
  renderAll();
  const el=$('mem-list');if(el)el.innerHTML=renderMemList();
  toast(`${m.name} 삭제됨`);
}

        <span style="font-size:11px;font-weight:700;color:#475569">항목 ${i+1}</span>
      </div>
      <div style="display:flex;gap:4px">
        <button class="btn btn-o btn-sm" onclick="movePrinciple(${i},-1)" ${isFirst?'disabled style="opacity:.3"':''} title="위로">↑</button>
        <button class="btn btn-o btn-sm" onclick="movePrinciple(${i},1)" ${isLast?'disabled style="opacity:.3"':''} title="아래로">↓</button>
        <button class="btn btn-r btn-sm" onclick="deletePrinciple(${i})" title="삭제">🗑 삭제</button>
      </div>

    <div class="fr" style="margin:0"><label>내용</label><textarea id="gd-b${i}" style="min-height:70px;resize:vertical" oninput="editPrinciples[${i}].body=this.value">${p.body}</textarea></div>
  </div>`;
}

function addGuidePrinciple(){
  syncAllPrinciples();
  const n = editPrinciples.length + 1;
  editPrinciples.push({num:String(n), title:`원칙 ${n} 제목을 입력하세요`, body:'내용을 입력하세요.'});
  renderEditGuideModal();
  setTimeout(()=>{
    const el=document.getElementById(`gd-row-${editPrinciples.length-1}`);
    el?.scrollIntoView({behavior:'smooth',block:'center'});
    document.getElementById(`gd-t${editPrinciples.length-1}`)?.focus();
    document.getElementById(`gd-t${editPrinciples.length-1}`)?.select();
  },80);
}

function deletePrinciple(i){
  if(editPrinciples.length<=1){toast('항목은 최소 1개 이상 필요합니다','warn');return;}
  syncAllPrinciples();
  editPrinciples.splice(i,1);
  editPrinciples.forEach((p,j)=>p.num=String(j+1));
  renderEditGuideModal();
  toast(`항목 ${i+1} 삭제됨`);
}

function movePrinciple(i, dir){
  syncAllPrinciples();
  const j=i+dir;
  if(j<0||j>=editPrinciples.length) return;
  [editPrinciples[i],editPrinciples[j]]=[editPrinciples[j],editPrinciples[i]];
  editPrinciples.forEach((p,k)=>p.num=String(k+1));
  renderEditGuideModal();
}

function syncAllPrinciples(){
  editIntro=$('gd-intro')?.value??editIntro;
  editPrinciples.forEach((p,i)=>{
    const t=document.getElementById(`gd-t${i}`);
    const b=document.getElementById(`gd-b${i}`);
    if(t) p.title=t.value;
    if(b) p.body=b.value;
  });
}

function saveGuideEdit(){
  syncAllPrinciples();
  GUIDE_CONTENT.intro=editIntro;
  GUIDE_CONTENT.principles=editPrinciples.map(p=>({...p}));
  saveGuideContent();
  closeModal();
  openGuideModal();
  toast('✅ 안내 내용이 저장되었습니다');
}

async function testSupabaseConn(){
  const url=$('sb-url')?.value.trim(),key=$('sb-key')?.value.trim();
  if(!url||!key){toast('URL과 Key를 입력하세요','warn');return;}
  toast('연결 테스트 중...');
  try{
    const client=window.supabase.createClient(url,key);
    const{error}=await client.schema('kanban').from('members').select('id').limit(1);
    if(error){
      if(error.code==='42P01') toast('연결 성공! (테이블 미생성 - SQL 실행 필요)','warn');
      else throw error;
    } else toast('✅ Supabase 연결 성공!');
  }catch(e){toast('연결 실패: '+(e.message||String(e)),'err');}
}

async function saveSupabaseConfig(){
  const url=$('sb-url')?.value.trim(),key=$('sb-key')?.value.trim();
  if(!url||!key){toast('URL과 Key를 모두 입력하세요','warn');return;}
  try{localStorage.setItem('sb_url',url);localStorage.setItem('sb_key',key);}catch(e){}
  SB_PRESET_URL=url; SB_PRESET_KEY=key;
  closeModal();
  toast('연결 중...');
  const ok=await initSupabase();
  if(ok){await loadFromSupabase(true);renderAll();toast('✅ Supabase 연결 완료! 📥 설정 포함 파일을 다운로드해 GitHub에 올리세요');}
}

function downloadConfiguredHTML(){
  const url=SB_PRESET_URL||localStorage.getItem('sb_url')||'';
  const key=SB_PRESET_KEY||localStorage.getItem('sb_key')||'';
  if(!url||!key){toast('먼저 저장 & 연결을 완료해주세요','warn');return;}
  let html=document.documentElement.outerHTML;
  html=html.replace(/let SB_PRESET_URL = '[^']*';/g,'let SB_PRESET_URL = \''+url+'\';');
  html=html.replace(/let SB_PRESET_KEY = '[^']*';/g,'let SB_PRESET_KEY = \''+key+'\';');
  html=html.replace('let SB_PRESET_LABELS = null;','let SB_PRESET_LABELS = '+JSON.stringify(LABELS)+';');
  html=html.replace('let SB_PRESET_WIP_MAX = null;','let SB_PRESET_WIP_MAX = '+WIP_MAX+';');
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='index.html';a.click();
  URL.revokeObjectURL(a.href);
  toast('📥 다운로드 완료! GitHub에 업로드하면 모든 기기에서 설정이 유지됩니다');
}

function disconnectSupabase(){

  sb=null;sbStatus='offline';updateConnBadge();
  closeModal();toast('연결 해제됨 · 로컬 모드로 전환');
}

    try{
      await sb.schema('kanban').from('checklists').delete().neq('id','__none__');

  const listHtml=sorted.length===0
    ?'<div style="text-align:center;padding:20px;color:#94A3B8;font-size:12px">등록된 공지사항이 없습니다</div>'

            <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:2px 6px" onclick="openEditNotice('${n.id}');event.stopPropagation()">✏️</button>
            <button class="btn btn-r btn-sm" onclick="deleteNotice('${n.id}');event.stopPropagation()">🗑</button>
          </div>
        </div>
        <div class="ntc-meta">${escH(n.author||'작성자 없음')} · ${n.date}</div>
        ${n.content?`<div class="ntc-content">${escH(n.content)}</div>`:''}
      </div>`).join('');

  const isEdit=_noticeEditId!=null;
  const editing=isEdit?notices.find(n=>n.id===_noticeEditId):null;

  function escA2(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  const formHtml=`
    <div style="background:${isEdit?'#FFFBEB':'#F0F9FF'};border:1px solid ${isEdit?'#FDE68A':'#BAE6FD'};border-radius:8px;padding:12px;margin-top:10px">

        <div class="fr" style="margin-bottom:8px"><label>날짜</label><input type="date" id="ntc-date" value="${isEdit?editing.date:todayStr()}"></div>
      </div>
      <div class="fr" style="margin-bottom:8px"><label>내용</label><textarea id="ntc-content" rows="3" style="resize:vertical;font-family:inherit;font-size:12.5px;padding:6px 8px;border:1px solid #CBD5E1;border-radius:6px;width:100%;box-sizing:border-box">${isEdit?escA2(editing.content):''}</textarea></div>

        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#475569;cursor:pointer">

          ${isEdit?`<button class="btn btn-ghost" onclick="_noticeEditId=null;_renderNoticeModal()">취소</button>`:''}
          <button class="btn btn-p" onclick="${isEdit?`saveNotice('${_noticeEditId}')`:'addNotice()'}">${isEdit?'저장':'등록'}</button>
        </div>
      </div>
    </div>`;

  return listHtml+formHtml;
}

async function addNotice(){
  const title=($('ntc-title')?.value||'').trim();
  const author=($('ntc-author')?.value||'').trim();
  const date=$('ntc-date')?.value||todayStr();
  const content=($('ntc-content')?.value||'').trim();
  const pinned=$('ntc-pin')?.checked||false;
  if(!title){toast('제목을 입력하세요','warn');return;}
  const n={id:uuid(),title,author,date,content,pinned};
  if(pinned) notices.unshift(n); else notices.push(n);
  notices.sort((a,b)=>Number(b.pinned)-Number(a.pinned));
  await pushNotice(n);
  toast(`✅ 공지 등록: ${title}`);
  _renderNoticeModal();
}

function openEditNotice(id){
  _noticeEditId=id;
  _noticeTab='notice';
  _renderNoticeModal();
}

async function saveNotice(id){
  const n=notices.find(x=>x.id===id);
  if(!n)return;
  const title=($('ntc-title')?.value||'').trim();
  const author=($('ntc-author')?.value||'').trim();
  const date=$('ntc-date')?.value||todayStr();
  const content=($('ntc-content')?.value||'').trim();
  const pinned=$('ntc-pin')?.checked||false;
  if(!title){toast('제목을 입력하세요','warn');return;}
  n.title=title; n.author=author; n.date=date; n.content=content; n.pinned=pinned;
  notices.sort((a,b)=>Number(b.pinned)-Number(a.pinned));
  await pushNotice(n);
  _noticeEditId=null;
  toast('✅ 공지 수정 완료');
  _renderNoticeModal();
}

async function deleteNotice(id){
  const n=notices.find(x=>x.id===id);
  if(!n||!confirm(`"${n.title}" 공지를 삭제할까요?`))return;
  notices=notices.filter(x=>x.id!==id);
  await deleteNoticeSB(id);
  toast('삭제됨');
  _renderNoticeModal();
}

async function togglePinNotice(id){
  const n=notices.find(x=>x.id===id);
  if(!n)return;
  n.pinned=!n.pinned;
  notices.sort((a,b)=>Number(b.pinned)-Number(a.pinned));
  await pushNotice(n);
  toast(n.pinned?'📌 고정됨':'고정 해제');
  _renderNoticeModal();
}

// ══════════════════════════════════════════════
// 휴가 일정 탭
// ══════════════════════════════════════════════
function _renderVacPane(){
  const today=todayStr();
  const absentToday=vacations.filter(v=>v.startDate<=today&&v.endDate>=today);
  const absentHtml=absentToday.length===0
    ?'<div class="vac-today-box"><span>✅</span><span style="color:#92400E">오늘 부재자 없음 — 전원 출근</span></div>'
    :`<div class="vac-today-box"><span>🏖️</span><span style="color:#92400E;font-weight:700">오늘 부재:</span>${absentToday.map(v=>{const m=MEMBERS.find(x=>x.name===v.name);return `<span style="padding:2px 8px;border-radius:10px;background:${m?.color||'#94A3B8'};color:#fff;font-size:11px;font-weight:700">${v.name} ${v.type}</span>`;}).join('')}</div>`;

  const calHtml=_renderVacCal(_vacCalYear,_vacCalMonth);
  const upcoming=[...vacations].filter(v=>v.endDate>=today).sort((a,b)=>a.startDate.localeCompare(b.startDate));
  const listHtml=upcoming.length===0
    ?'<div style="text-align:center;padding:16px;color:#94A3B8;font-size:12px">예정된 휴가 없음</div>'
    :upcoming.map(v=>{
        const m=MEMBERS.find(x=>x.name===v.name);
        const tc=VAC_TYPE_COLOR[v.type]||'#64748B';
        const isNow=v.startDate<=today&&v.endDate>=today;
        return `<div class="vac-item">
          <div class="av" style="background:${m?.color||'#94A3B8'};width:28px;height:28px;font-size:10px;flex-shrink:0">${v.name.slice(-2)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:12.5px;font-weight:700;color:#1E293B">${v.name} <span class="vac-badge" style="background:${tc}22;color:${tc}">${v.type}</span>${isNow?'<span style="font-size:10px;color:#D97706;margin-left:4px">진행 중</span>':''}</div>
            <div style="font-size:11px;color:#64748B;margin-top:2px">${v.startDate}${v.startDate!==v.endDate?` ~ ${v.endDate}`:''}${v.note?` · ${v.note}`:''}</div>
          </div>
          <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:2px 6px" onclick="openEditVacation('${v.id}')">✏️</button>
          <button class="btn btn-r btn-sm" onclick="deleteVacation('${v.id}')">🗑</button>
        </div>`;
      }).join('');

  const past=vacations.filter(v=>v.endDate<today).sort((a,b)=>b.startDate.localeCompare(a.startDate));
  const pastHtml=past.length>0?`<details style="margin-top:8px"><summary style="font-size:11.5px;color:#94A3B8;cursor:pointer;padding:4px 0">지난 휴가 ${past.length}건 보기</summary>${past.map(v=>{const m=MEMBERS.find(x=>x.name===v.name);const tc=VAC_TYPE_COLOR[v.type]||'#64748B';return `<div class="vac-item" style="opacity:.65"><div class="av" style="background:${m?.color||'#94A3B8'};width:24px;height:24px;font-size:9px;flex-shrink:0">${v.name.slice(-2)}</div><div style="flex:1"><div style="font-size:12px;font-weight:600">${v.name} <span class="vac-badge" style="background:${tc}22;color:${tc}">${v.type}</span></div><div style="font-size:11px;color:#94A3B8">${v.startDate}${v.startDate!==v.endDate?` ~ ${v.endDate}`:''}</div></div><div style="display:flex;gap:4px"><button class="btn btn-ghost btn-sm" style="font-size:11px;padding:2px 5px" onclick="openEditVacation('${v.id}')">✏️</button><button class="btn btn-r btn-sm" onclick="deleteVacation('${v.id}')">🗑</button></div></div>`;}).join('')}</details>`:'';

  const isEdit=_vacEditId!=null;
  const editing=isEdit?vacations.find(v=>v.id===_vacEditId):null;
  const defStart=editing?.startDate||today;
  const defEnd=editing?.endDate||today;
  const addForm=`
    <div style="background:${isEdit?'#FFFBEB':'#F0F9FF'};border:1px solid ${isEdit?'#FDE68A':'#BAE6FD'};border-radius:8px;padding:12px;margin-top:10px">
      <div style="font-size:12px;font-weight:700;color:#1F3864;margin-bottom:10px">${isEdit?'✏️ 휴가 수정':'➕ 휴가 등록'}</div>
      <div class="fr-row">
        <div class="fr" style="margin-bottom:8px"><label>팀원</label><select id="vac-who">${MEMBERS.map(mm=>`<option${editing&&mm.name===editing.name?' selected':''}>${mm.name}</option>`).join('')}</select></div>
        <div class="fr" style="margin-bottom:8px"><label>유형</label><select id="vac-type">${VAC_TYPES.map(t=>`<option${editing&&t===editing.type?' selected':''}>${t}</option>`).join('')}</select></div>
      </div>
      <div class="fr-row">
        <div class="fr" style="margin-bottom:8px"><label>시작일</label><input type="date" id="vac-start" value="${defStart}"></div>
        <div class="fr" style="margin-bottom:8px"><label>종료일</label><input type="date" id="vac-end" value="${defEnd}"></div>
      </div>
      <div class="fr" style="margin-bottom:8px"><label>메모 (선택)</label><input id="vac-note" placeholder="예: 개인 사유, 여행 등" value="${editing?.note||''}"></div>
      <div style="display:flex;justify-content:flex-end;gap:7px">
        ${isEdit?`<button class="btn btn-ghost" onclick="_vacEditId=null;_renderNoticeModal()">취소</button>`:''}
        <button class="btn btn-p" onclick="${isEdit?`saveVacationEdit('${_vacEditId}')`:'addVacation()'}">${isEdit?'저장':'등록'}</button>
      </div>
    </div>`;

  return `<div style="font-size:11.5px;font-weight:700;color:#475569;margin-bottom:7px">📋 휴가 일정 (${upcoming.length}건)</div>`
    +absentHtml+calHtml+listHtml+pastHtml+addForm;
}

function _renderVacCal(year, month){
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=todayStr();
  const dayNames=['일','월','화','수','목','금','토'];
  let g=`<div class="vac-cal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <button class="btn btn-ghost" style="padding:2px 8px" onclick="_vacCalPrev()">‹</button>
      <div style="font-size:12px;font-weight:700;color:#1F3864">${year}년 ${month+1}월</div>
      <button class="btn btn-ghost" style="padding:2px 8px" onclick="_vacCalNext()">›</button>
    </div>
    <div class="vac-cal-grid">`;
  for(const d of dayNames) g+=`<div class="vac-cal-hdr" style="${d==='일'?'color:#DC2626':d==='토'?'color:#2563EB':''}">${d}</div>`;
  for(let i=0;i<firstDay;i++) g+=`<div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayVacs=getVacationsOnDate(ds);
    const isToday=ds===today;
    const dow=new Date(year,month,d).getDay();
    const wkColor=dow===0?'#DC2626':dow===6?'#2563EB':'#334155';
    const dots=dayVacs.length>0?`<div class="vac-dots">${dayVacs.slice(0,4).map(v=>{const m=MEMBERS.find(x=>x.name===v.name);return `<div class="vac-dot" style="background:${m?.color||'#94A3B8'}" title="${v.name}"></div>`;}).join('')}</div>`:'';
    g+=`<div class="vac-cal-day ${isToday?'vac-cal-today':''}"><div style="font-size:10.5px;color:${wkColor};${isToday?'font-weight:700':''}">${d}</div>${dots}</div>`;
  }
  g+=`</div></div>`;
  return g;
}

function _vacCalPrev(){_vacCalMonth--;if(_vacCalMonth<0){_vacCalMonth=11;_vacCalYear--;}_renderNoticeModal();}
function _vacCalNext(){_vacCalMonth++;if(_vacCalMonth>11){_vacCalMonth=0;_vacCalYear++;}_renderNoticeModal();}

async function addVacation(){
  const name=($('vac-who')?.value||'').trim();
  const type=$('vac-type')?.value||'연차';
  const start=$('vac-start')?.value;
  const end=$('vac-end')?.value;
  const note=($('vac-note')?.value||'').trim();
  if(!name||!start||!end){toast('팀원과 날짜를 입력하세요','warn');return;}
  if(start>end){toast('종료일이 시작일보다 빠릅니다','warn');return;}
  const v={id:uuid(),name,startDate:start,endDate:end,type,note};
  vacations.push(v);
  await pushVacation(v);
  renderAll();
  toast(`✅ ${name} ${type} 등록 완료`);
  _renderNoticeModal();
}

function openEditVacation(id){
  _vacEditId=id;
  _noticeTab='vacation';
  _renderNoticeModal();
}

async function saveVacationEdit(id){
  const v=vacations.find(x=>x.id===id);
  if(!v)return;
  const name=($('vac-who')?.value||'').trim();
  const type=$('vac-type')?.value||'연차';
  const start=$('vac-start')?.value;
  const end=$('vac-end')?.value;
  const note=($('vac-note')?.value||'').trim();
  if(!name||!start||!end){toast('팀원과 날짜를 입력하세요','warn');return;}
  if(start>end){toast('종료일이 시작일보다 빠릅니다','warn');return;}
  v.name=name; v.startDate=start; v.endDate=end; v.type=type; v.note=note;
  await pushVacation(v);
  renderAll();
  _vacEditId=null;
  toast('✅ 휴가 수정 완료');
  _renderNoticeModal();
}

async function deleteVacation(id){
  const v=vacations.find(x=>x.id===id);
  if(!v||!confirm(`${v.name} ${v.type} 일정을 삭제할까요?`))return;
  vacations=vacations.filter(x=>x.id!==id);
  await deleteVacationSB(id);
  renderAll();
  toast('삭제됨');
  _renderNoticeModal();
}

// 모바일 보드 스크롤 시 탭 동기화
document.getElementById('board').addEventListener('scroll', function(){
  if(window.innerWidth>640) return;
  const board=this;
  const cols=['backlog','prog','review','done'];
  let active=cols[0];
  for(const id of cols){
    const c=document.getElementById('col-'+id);
    if(c && c.offsetLeft-board.offsetLeft <= board.scrollLeft+10) active=id;
  }
  document.querySelectorAll('.mob-tab').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('onclick')&&b.getAttribute('onclick').includes("'"+active+"'"));
  });
}, {passive:true});
</script>
